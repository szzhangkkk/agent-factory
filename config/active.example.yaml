# Agent Factory Configuration
# 复制此文件为 active.yaml 并填入你的配置：
#   cp config/active.example.yaml config/active.yaml

llm:
  # 可选: deepseek / qwen / zhipu / moonshot / claude / openai / ollama / custom
  provider: deepseek
  base_url: https://api.deepseek.com/v1
  api_key: "your-api-key-here"       # 替换为你的 API key
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096

embedding:
  # local 模式使用本地模型，无需 API key（推荐）
  provider: local
  model: BAAI/bge-small-zh-v1.5
  # 首次运行会自动从 HuggingFace 下载模型（约 400MB）
  # 国内用户建议: export HF_ENDPOINT=https://hf-mirror.com

