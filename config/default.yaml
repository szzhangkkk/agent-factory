# Agent Factory Default Configuration

llm:
  provider: deepseek
  base_url: https://api.deepseek.com/v1
  api_key: ""
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096

embedding:
  provider: local
  model: BAAI/bge-small-zh-v1.5

vector_db:
  type: milvus_lite
  path: ./data/vectordb
  collection: agent_docs

chunking:
  strategy: semantic
  max_chunk_size: 1024
  overlap: 128
  respect_structure: true

retrieval:
  strategy: hybrid
  top_k: 5
  vector_weight: 0.7
  bm25_weight: 0.3
  rerank: true
  rerank_top_k: 5

benchmark:
  test_questions_per_doc: 5
  metrics:
    - recall
    - precision
    - mrr
    - faithfulness
    - relevance
